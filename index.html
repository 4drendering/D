    <div id="col">
        <p id="textp">LOADING...</p>
    </div>
    <script>
        if (Detector.webgl) {
            var width = window.innerWidth;
            var container, stats, light;
            var camera, scene, renderer;
            var windowHalfX = window.innerWidth / 2;
            var windowHalfY = window.innerHeight / 2;
            init();
            animate();

            function init() {
                container = document.createElement('div');
                document.body.appendChild(container);
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);


                // scene
                scene = new THREE.Scene();
                var ambientLight = new THREE.AmbientLight(0xcccccc, 0.4);
                scene.add(ambientLight);
                var pointLight = new THREE.PointLight(0xffffff, 0.8);
                camera.add(pointLight);
                scene.background = new THREE.Color(0xffffff);
                scene.add(camera);
                //webgl
                renderer = new THREE.WebGLRenderer();
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                container.appendChild(renderer.domElement);
                window.addEventListener('resize', onWindowResize, false);
                //color
                mtl = new THREE.MeshBasicMaterial({
                    color: 0x986666,
                });
                // model
                var onProgress = function(xhr) {
                    if (xhr.lengthComputable) {
                        var percentComplete = xhr.loaded / xhr.total * 100;
                        console.log(Math.round(percentComplete, 2) + '% downloaded');
                    }
                };
                var onError = function(xhr) {};
                THREE.Loader.Handlers.add(/\.dds$/i, new THREE.DDSLoader());
                mtlLoader = new THREE.MTLLoader();
                mtlLoader.setPath('model/obj/');
                mtlLoader.load('orginal.mtl', function(materials) {
                    materials.preload();
                    objLoader = new THREE.OBJLoader();
                    objLoader.setMaterials(materials);
                    objLoader.setPath('model/obj/');
                    objLoader.load('orginal.obj', function(object) {
                        object.position.set(0, -70, 20);
                        object.rotation.set(-1.5, 0, -2.3);
                        scene.add(object);
                    }, onProgress, onError);
                });
                //

                var controls = new THREE.OrbitControls(camera);
                controls.minDistance = 205;
                if (width <= 320) {
                    camera.position.set(200, 20, 280);
                }
                if (width > 320 && width <= 480) {
                    camera.position.set(100, 20, 280);
                }
                if (width > 480) {
                    camera.position.set(0, 20, 280);
                }

                controls.update();

                //controls

            }

            function onWindowResize() {
                windowHalfX = window.innerWidth / 2;
                windowHalfY = window.innerHeight / 2;
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            //
            function animate() {
                requestAnimationFrame(animate);
                render();
            }

            function render() {
                camera.lookAt(scene.position);
                renderer.render(scene, camera);
            }
        }else{
            document.getElementById("ttx").innerHTML="your browser does not support please update your browser";
        }

    </script>
    <p style="color: white;font-weight: bold;position: absolute;text-align: center;" id="ttx"></p>
